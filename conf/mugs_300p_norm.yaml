      - samples/uniform_sphere_1.npy
      - samples/uniform_sphere_2.npy
      - samples/uniform_sphere_3.npy
      - samples/uniform_sphere_4.npy
      - samples/uniform_sphere_5.npy
      - samples/uniform_sphere_6.npy
      - samples/uniform_sphere_7.npy
      - samples/uniform_sphere_8.npy
