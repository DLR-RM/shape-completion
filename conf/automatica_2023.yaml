defaults:
  - shapenet_v1_depth
  - _self_

data:
  frame: net

norm:
  center: True
  scale: True

aug:
  noise: 0.002
  edge_noise: 0.01
  remove_angle: True

train:
  early_stopping: True
  scheduler: ReduceLROnPlateau

test:
  run: True
  dir: automatica_2023_test
  filename: depth_points_net.ply

log:
  project: automatica_2023
