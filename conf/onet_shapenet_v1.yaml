defaults:
  - shapenet_v1_core
  - _self_

files:
  pointcloud: samples/surface.npz
  points:
    train:
      - samples/uniform_random.npz
    val:
      - samples/uniform_random.npz
    test:
      - samples/uniform_random.npz

points:
  crop: False
  load_all: True
  load_random: False
  load_surface: False

aug:
  noise: 0.005

train:
  lr: 1e-4
  scale_lr: False
  optimizer: Adam
  weight_decay: 0
  epochs: 300
  model_selection_metric: val/iou
  reduction: sum_points
  batch_size: 64

val:
  freq: 10

log:
  freq: 100
