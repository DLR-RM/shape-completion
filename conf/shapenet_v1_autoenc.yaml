defaults:
  - shapenet_v1
  - _self_

files:
  points:
    train:
      - samples/uniform_random.npz
      - samples/surface_random.npz
    val:
      - samples/uniform_random.npz
    test:
      - samples/uniform_random.npz

model:
  arch: 3dshape2vecset_orig
  compile: True

data:
  cache: True

inputs:
  num_points: 2048
  nerf: True

points:
  load_all: True
  load_surface: False
  nerf: True

norm:
  scale: True

aug:
  noise: 0.0025
  scale: 0.25

train:
  precision: bf16-mixed
  lr: 9.765625e-8  # 5e-5 w/ batch size 512
  min_lr: 1.953125e-9  # 1e-6 w/ batch size 512
  warmup_frac: 0.05
  scheduler: LinearWarmupCosineAnnealingLR
  batch_size: 512
  epochs: 1600
  num_query_points: 2048
  weight_decay: 0.0  # 0.05 claimed in the paper but not used in the code

val:
  freq: 10
  num_query_points: 50000
  no_aug: True

test:
  num_query_points: ${val.num_query_points}
  no_aug: True

vis:
  num_query_points: 10000

log:
  project: autoenc
  freq: 10

load:
  prefetch_factor: 1