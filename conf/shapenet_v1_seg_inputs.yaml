defaults:
  - shapenet_v1
  - _self_

cls:
  occupancy: False

seg:
  inputs: True
  num_classes: 50
  weight: 1.0

train:
  optimizer: AdamW8bit
  precision: bf16-mixed
  epochs: 300
  model_selection_metric: val/seg_iou_macro

inputs:
  num_points: 2048

vis:
  occupancy: False

log:
  project: segmentation
  metrics:
    - seg_iou_macro
    - seg_f1_macro
    - seg_precision_macro
    - seg_recall_macro
    - seg_auprc_macro
    - seg_ece
    - seg_acc_macro