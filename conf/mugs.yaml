defaults:
  - shapenet
  - _self_

files:
  pointcloud: samples/surface.npy
  points:
    train:
      - samples/surface_random.npy
      - samples/uniform_sphere.npy
    val:
      - samples/uniform_random.npy
      - samples/uniform_sphere.npy
    test:
      - samples/uniform_random.npy
      - samples/uniform_sphere.npy
  normals: samples/normals.npy
  mesh:
  split:
    train: all.lst
    val: all.lst
    test: all.lst

model:
  arch: conv_onet_grid

data:
  categories:
    - "03797390"
  num_files:
    train: 100
    val: 10
    test: 10
  num_shards:
    train: 10
    val: 10
    test: 20
  unscale: True
  undistort: True
  frame: net
  # SharedDataLoader cache is unbounded; with the mugs working set
  # (230 shapes × 100 files × 10 shards × heavy augmentation × 2048-point
  # clouds) it OOMs at num_workers > 0. Re-enable per-config when running on
  # a host with sufficient RAM.

inputs:
  type: depth_bp
  # Paper used `null` (variable-size depth-pixel clouds) with heterogeneous
  # batching via PyTorch3D's Pointclouds. Pinned to 2048 here so the config
  # works without PyTorch3D installed — slight semantic divergence (fixed-size
  # subsample instead of variable). For exact paper reproduction:
  #   1. Install PyTorch3D (Tier-2 / scripts/compile_cuda_libs.sh)
  #   2. Override on CLI: `inputs.num_points=null`
  num_points: 2048

points:
  load_uncertain: False
  crop: True

norm:
  center: xyz

aug:
  noise: 0.005
  edge_noise: 0.01
  remove_angle: True
  scale: 6

train:
  batch_size: 16
  epochs: 100

val:
  batch_size: 16
  freq: 0.5

log:
  freq: 100

load:
  keys_to_keep:
    - index
    - category.id
    - category.name
    - category.index
    - inputs
    - inputs.path
    - inputs.name
    - points
    - points.occ